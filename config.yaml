###############################################################################
#  LiveTalking YAML 配置示例
#  使用方法: python app.py --config config.yaml
#  或直接: python app.py (默认会加载此文件)
###############################################################################

# ─── 数字人模型 ────────────────────────────────────────────────────
model: wav2lip                      # avatar model: musetalk/wav2lip/ultralight
avatar_id: wav2lip256_avatar1       # avatar id in data/avatars
batch_size: 16                      # infer batch size
modelres: 192                       # model resolution

# ─── 音频 ──────────────────────────────────────────────────────────
fps: 25                             # video fps (must be 25 for wav2lip)

# ─── TTS ───────────────────────────────────────────────────────────
tts: edgetts                        # tts plugin: edgetts/gpt-sovits/cosyvoice/fishtts/doubao/indextts2/azuretts/qwentts
REF_FILE: zh-CN-YunxiaNeural        # 参考文件名或语音模型ID
TTS_SERVER: http://127.0.0.1:9880   # TTS server URL (for gpt-sovits/cosyvoice)

# ─── 传输 ─────────────────────────────────────────────────────────
transport: webrtc                   # output mode: rtcpush/webrtc/rtmp/virtualcam
listenport: 8010                    # web server listen port
max_session: 5                      # max concurrent sessions

# ─── 虚拟摄像头 ───────────────────────────────────────────────────
# virtualcam: true                   # 启用虚拟摄像头输出（推送到 OBS 虚拟摄像头）
# audio_output_device: 25            # 音频输出设备索引（None=系统默认，使用 python list_audio_devices.py 查看所有设备）
# 注意：当 transport=virtualcam 或 virtualcam=true 时，会自动启用虚拟摄像头

# ─── RTMP 推流 ────────────────────────────────────────────────────
# push_url: http://localhost:1985/rtc/v1/whip/?app=live&stream=livestream

# ─── 自定义动作 ───────────────────────────────────────────────────
# customvideo_config: ''             # custom action json file path